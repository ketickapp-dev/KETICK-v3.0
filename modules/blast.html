<section id="blast-section" class="section-animate">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-3xl font-black tracking-tight text-gray-800">Smart Blast</h2>
            <p class="text-gray-500 text-sm font-medium">Hantar mesej pukal kepada pangkalan data CRM anda.</p>
        </div>
        <div class="bg-emerald-100 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">
            Direct Mode: Active
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-8 rounded-[40px] border border-gray-100 shadow-sm">
                <h3 class="font-bold text-gray-800 mb-6 italic">1. Sediakan Mesej</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-2 block">Platform Blast</label>
                        <select id="blast-platform" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none outline-none">
                            <option value="wa">WhatsApp Business</option>
                            <option value="tg">Telegram Direct</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-2 block">Kandungan Mesej</label>
                        <textarea id="blast-msg" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-medium h-48 border-none" placeholder="Salam [NAMA], kami ada promosi..."></textarea>
                        <p class="text-[9px] text-blue-500 font-bold mt-2 px-2">Gunakan [NAMA] untuk personalisasi automatik.</p>
                    </div>

                    <button onclick="startBlast()" class="w-full bg-emerald-500 text-white py-5 rounded-[24px] font-bold text-lg shadow-xl shadow-emerald-100 active:scale-95 transition-all">
                        MULAKAN BLAST <i class="fas fa-paper-plane ml-2"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white rounded-[40px] border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                    <h4 class="font-bold text-gray-800 text-sm">Penerima dari CRM (${clients.length})</h4>
                    <span class="text-[10px] text-gray-400 font-bold">SENT STATUS</span>
                </div>
                <div id="blast-client-list" class="max-h-[500px] overflow-y-auto divide-y divide-gray-50">
                    </div>
            </div>
        </div>
    </div>
</section>
