<div class="mt-12 bg-white rounded-[35px] border border-red-50 shadow-sm overflow-hidden">
    <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-red-50/30">
        <h4 class="font-bold text-red-600 text-sm uppercase tracking-widest"><i class="fas fa-history mr-2"></i> Audit Log (Aktiviti Sensitif)</h4>
        <span class="text-[9px] font-black text-red-300 uppercase">Admin Only</span>
    </div>
    <div class="max-h-60 overflow-y-auto">
        <table class="w-full text-left">
            <tbody id="billing-audit-log" class="text-[11px]">
                </tbody>
        </table>
    </div>
</div>

<div id="void-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
    <div class="bg-white w-full max-w-xs rounded-[35px] p-8 relative z-10 shadow-2xl text-center">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-shield-alt text-2xl"></i>
        </div>
        <h3 class="font-black text-gray-800 mb-2">Pengesahan Admin</h3>
        <p class="text-xs text-gray-500 mb-6 font-medium">Sila masukkan password untuk memadam/void dokumen ini.</p>
        
        <input type="password" id="admin-password" placeholder="••••" class="w-full p-4 bg-gray-50 rounded-2xl text-center font-black tracking-[0.5em] border-none outline-none focus:ring-2 focus:ring-red-500 mb-4">
        
        <div class="flex gap-3">
            <button onclick="closeVoidModal()" class="flex-1 py-3 font-bold text-gray-400 text-sm">Batal</button>
            <button onclick="confirmVoid()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-red-200">VOID BILL</button>
        </div>
    </div>
</div>
