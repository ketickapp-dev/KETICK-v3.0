<section id="dashboard-section" class="section-animate">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-4xl font-black tracking-tight text-gray-800">Ringkasan Niaga</h2>
            <p class="text-gray-500 font-medium">Prestasi semasa perniagaan anda hari ini.</p>
        </div>
        <div class="text-right hidden md:block">
            <p id="current-date-display" class="font-bold text-blue-600 uppercase tracking-widest text-xs">
                </p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div class="lg:col-span-2 bg-white/80 backdrop-blur-xl rounded-[35px] p-8 border border-white shadow-sm flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Revenue Terkini (Receipt)</h3>
                <div class="flex gap-2">
                    <button onclick="loadModule('lhdn')" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold tracking-tighter hover:bg-orange-200 transition">
                        REKOD CUKAI <i class="fas fa-plus ml-1"></i>
                    </button>
                </div>
            </div>
            <div class="my-6">
                <h1 id="dash-total-rev" class="text-6xl font-black tracking-tighter text-blue-600">RM 0.00</h1>
                <p class="text-gray-400 font-medium mt-2">Berdasarkan jualan yang telah disahkan bayar.</p>
            </div>
            <div class="grid grid-cols-3 gap-4 border-t border-gray-100 pt-6">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Untung Kasar</p>
                    <p id="dash-total-margin" class="text-xl font-bold text-emerald-500">RM 0.00</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Belanja (Tax)</p>
                    <p id="dash-tax-expense" class="text-xl font-bold text-orange-500">RM 0.00</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Inventori</p>
                    <p id="dash-inv-count" class="text-xl font-bold text-gray-800">0 Jenis</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[35px] p-6 border border-gray-100 shadow-sm">
            <h3 class="font-bold text-gray-800 text-sm mb-4"><i class="fas fa-id-card mr-2 text-blue-500"></i>Profil Syarikat</h3>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <div class="flex-1 bg-gray-50 p-4 rounded-2xl text-center border border-dashed border-gray-200">
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Status Awan</p>
                        <p class="text-xs font-bold text-emerald-500"><i class="fas fa-cloud"></i> Connected</p>
                    </div>
                </div>
                <input type="text" id="set-biz-name" oninput="updateBizProfile()" class="w-full p-3 bg-gray-50 border-none rounded-2xl text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Nama Syarikat">
                <textarea id="set-biz-addr" oninput="updateBizProfile()" class="w-full p-3 bg-gray-50 border-none rounded-2xl text-xs h-20 outline-none" placeholder="Alamat & No. SSM"></textarea>
                <input type="text" id="set-biz-bank" oninput="updateBizProfile()" class="w-full p-3 bg-gray-50 border-none rounded-2xl text-[11px] outline-none" placeholder="Bank & No Akaun">
            </div>
        </div>
    </div>

    <div class="bg-white/50 backdrop-blur-md p-8 rounded-[40px] border border-white shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl tracking-tight text-gray-800">Jadual Kerja & Temujanji</h3>
            <button onclick="addJob()" class="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg shadow-blue-200 hover:scale-105 transition">
                + Tambah Nota
            </button>
        </div>
        <div id="calendar-widget" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            </div>
    </div>
</section>
