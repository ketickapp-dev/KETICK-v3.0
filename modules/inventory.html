<section id="inventory-section" class="section-animate">

        <h2 class="text-3xl font-black">Inventori Stok</h2>
        <button onclick="addInventoryItem()" class="bg-black text-white px-8 py-3 rounded-2xl font-bold">+ Produk Baru</button>
    </div>
    <div class="flux-card overflow-x-auto bg-white rounded-[28px] p-4">
        <table class="w-full text-left">
            <thead class="border-b">
                <tr class="text-[10px] uppercase font-bold text-gray-400">
                    <th class="p-6">Produk</th>
                    <th class="p-6">Kos</th>
                    <th class="p-6">Jual</th>
                    <th class="p-6 text-center">Stok</th>
                </tr>
            </thead>
            <tbody id="inventory-table-body">
                </tbody>
        </table>
    </div>
</section>
