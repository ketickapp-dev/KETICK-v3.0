<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Wizard | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F2F2f7; 
            background-image: radial-gradient(circle at top right, #e0e7ff, transparent), radial-gradient(circle at bottom left, #fce7f3, transparent);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="setup-card" class="max-w-md w-full glass-card rounded-[45px] shadow-2xl p-10 border border-white transition-all duration-500">
        <div class="flex justify-between items-start mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-[22px] flex items-center justify-center shadow-2xl shadow-blue-200">
                <i class="fas fa-cloud-bolt text-white text-2xl animate-pulse"></i>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-widest">Step 1 of 1</span>
            </div>
        </div>
        
        <h2 class="text-3xl font-black tracking-tighter text-gray-800 mb-2">Konfigurasi Cloud</h2>
        <p class="text-sm text-gray-500 font-medium mb-8 leading-relaxed">
            Sila masukkan maklumat dari <b>Firebase Console</b> untuk mengaktifkan fungsi simpanan awan & sekuriti KETICK OS.
        </p>
        
        <div class="space-y-4">
            <div class="group">
                <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1.5 block group-focus-within:text-blue-600 transition">Firebase API Key</label>
                <input type="text" id="api-key" placeholder="AIzaSy..." class="w-full p-4 bg-white/50 border border-gray-100 rounded-2xl text-sm font-bold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1.5 block">Project ID</label>
                    <input type="text" id="project-id" placeholder="ketick-os-xxx" class="w-full p-4 bg-white/50 border border-gray-100 rounded-2xl text-sm font-bold focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1.5 block">Auth Domain</label>
                    <input type="text" id="auth-domain" placeholder="xxx.firebaseapp.com" class="w-full p-4 bg-white/50 border border-gray-100 rounded-2xl text-sm font-bold focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1.5 block">Storage Bucket</label>
                <input type="text" id="storage-bucket" placeholder="xxx.appspot.com" class="w-full p-4 bg-white/50 border border-gray-100 rounded-2xl text-sm font-bold focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
            </div>
        </div>

        <button onclick="saveConfig()" id="btn-save" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-[28px] font-black text-lg mt-10 shadow-2xl shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-3">
            <span>AKTIFKAN SISTEM</span>
            <i class="fas fa-arrow-right text-sm"></i>
        </button>
        
        <div class="mt-8 flex items-center justify-center gap-4 opacity-30">
            <div class="h-[1px] flex-1 bg-gray-400"></div>
            <p class="text-[9px] font-black text-gray-500 uppercase tracking-[0.3em]">Ketick OS Flux</p>
            <div class="h-[1px] flex-1 bg-gray-400"></div>
        </div>
    </div>

    <script>
        // Semak jika konfigurasi sedia ada
        window.onload = () => {
            const saved = localStorage.getItem('ketick_config');
            if(saved) {
                const data = JSON.parse(saved);
                document.getElementById('api-key').value = data.apiKey || '';
                document.getElementById('project-id').value = data.projectId || '';
                document.getElementById('auth-domain').value = data.authDomain || '';
                document.getElementById('storage-bucket').value = data.storageBucket || '';
            }
        };

        async function saveConfig() {
            const btn = document.getElementById('btn-save');
            const card = document.getElementById('setup-card');
            
            const config = {
                apiKey: document.getElementById('api-key').value.trim(),
                authDomain: document.getElementById('auth-domain').value.trim(),
                projectId: document.getElementById('project-id').value.trim(),
                storageBucket: document.getElementById('storage-bucket').value.trim()
            };

            // Validasi Input
            if(!config.apiKey || !config.projectId) {
                alert("Ralat: Firebase API Key dan Project ID diperlukan.");
                return;
            }

            // Animasi Loading
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> MENYAMBUNGKAN...`;
            
            // Simpan ke LocalStorage
            localStorage.setItem('ketick_config', JSON.stringify(config));
            
            // Simulasi "Handshake" dengan cloud
            setTimeout(() => {
                btn.innerHTML = `<i class="fas fa-check-circle"></i> BERJAYA!`;
                btn.classList.replace('bg-blue-600', 'bg-emerald-500');
                
                setTimeout(() => {
                    card.classList.add('opacity-0', 'scale-95');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                }, 1000);
            }, 1500);
        }
    </script>
</body>
</html>
