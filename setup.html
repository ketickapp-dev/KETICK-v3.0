<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Wizard | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F2F2f7; background-image: radial-gradient(circle at top right, #e0e7ff, transparent), radial-gradient(circle at bottom left, #fce7f3, transparent); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .hidden-step { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="setup-card" class="max-w-md w-full glass-card rounded-[45px] shadow-2xl p-10 border border-white transition-all duration-500">
        <div class="flex justify-between items-start mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-[22px] flex items-center justify-center shadow-2xl shadow-blue-200">
                <i class="fas fa-briefcase text-white text-2xl" id="step-icon"></i>
            </div>
            <div class="text-right">
                <span id="step-indicator" class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-widest">Step 1 of 2</span>
            </div>
        </div>
        
        <div id="step-1" class="space-y-4">
            <h2 class="text-3xl font-black tracking-tighter text-gray-800 mb-2">Konfigurasi Cloud</h2>
            <p class="text-sm text-gray-500 font-medium mb-6 leading-relaxed">Masukkan maklumat Firebase anda.</p>
            
            <input type="text" id="api-key" placeholder="Firebase API Key" class="w-full p-4 bg-white/50 border border-gray-100 rounded-2xl text-sm font-bold outline-none mb-2">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="project-id" placeholder="Project ID" class="w-full p-4 bg-white/50 border border-gray-100 rounded-2xl text-sm font-bold outline-none">
                <input type="text" id="auth-domain" placeholder="Auth Domain" class="w-full p-4 bg-white/50 border border-gray-100 rounded-2xl text-sm font-bold outline-none">
            </div>
            <button onclick="nextStep(2)" class="w-full bg-black text-white py-5 rounded-[28px] font-black text-sm mt-6 flex items-center justify-center gap-3">
                TERUSKAN <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div id="step-2" class="space-y-4 hidden-step">
            <h2 class="text-3xl font-black tracking-tighter text-gray-800 mb-2">Profil Bisnes</h2>
            <p class="text-sm text-gray-500 font-medium mb-6">Maklumat ini akan dipaparkan pada Invois/Resit.</p>
            
            <input type="text" id="biz-name" placeholder="Nama Syarikat / Kedai" class="w-full p-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold outline-none">
            <input type="text" id="biz-ssm" placeholder="No. SSM / Pendaftaran" class="w-full p-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold outline-none">
            <textarea id="biz-address" placeholder="Alamat Penuh Premis" class="w-full p-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold outline-none h-20"></textarea>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="biz-bank" placeholder="Nama Bank (Cth: Maybank)" class="w-full p-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold outline-none">
                <input type="text" id="biz-acc" placeholder="No. Akaun Bank" class="w-full p-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold outline-none">
            </div>

            <button onclick="saveAllConfig()" id="btn-save" class="w-full bg-blue-600 text-white py-5 rounded-[28px] font-black text-sm mt-6 shadow-xl active:scale-95">
                AKTIFKAN SISTEM & PROFIL
            </button>
        </div>
    </div>

    <script>
        function nextStep(step) {
            document.getElementById('step-1').classList.add('hidden-step');
            document.getElementById('step-2').classList.remove('hidden-step');
            document.getElementById('step-indicator').innerText = 'Step 2 of 2';
            document.getElementById('step-icon').className = 'fas fa-id-card text-white text-2xl';
        }

        async function saveAllConfig() {
            const btn = document.getElementById('btn-save');
            
            // 1. Simpan Config Firebase
            const config = {
                apiKey: document.getElementById('api-key').value,
                projectId: document.getElementById('project-id').value,
                authDomain: document.getElementById('auth-domain').value
            };
            localStorage.setItem('ketick_config', JSON.stringify(config));

            // 2. Simpan Profil Bisnes
            const profile = {
                name: document.getElementById('biz-name').value.toUpperCase(),
                ssm: document.getElementById('biz-ssm').value,
                address: document.getElementById('biz-address').value,
                bankName: document.getElementById('biz-bank').value.toUpperCase(),
                bankAcc: document.getElementById('biz-acc').value,
                phone: "Sila Kemaskini", // Boleh ditambah input jika perlu
                logo: "https://cdn-icons-png.flaticon.com/512/6211/6211181.png"
            };
            localStorage.setItem('ketick_business_profile', JSON.stringify(profile));

            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> MENYIMPAN...`;
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
    </script>
</body>
</html>
