<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK OS | Business Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --ios-bg: #F2F2f7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: var(--ios-bg); }
        #module-viewport { transition: opacity 0.3s ease-in-out, transform 0.3s ease-out; }
        .module-loading { opacity: 0; transform: translateY(10px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside id="sidebar-container" class="z-40"></aside>

    <main class="flex-1 p-4 md:p-8 overflow-y-auto h-screen" id="main-content">
        <div id="loader" class="hidden fixed top-5 right-5 bg-white/80 backdrop-blur-md px-5 py-3 rounded-full shadow-2xl z-[100] border border-blue-50 animate-bounce">
            <p class="text-[10px] font-black text-blue-600 flex items-center tracking-widest uppercase">
                <i class="fas fa-circle-notch fa-spin mr-3 text-sm"></i> KETICK OS Syncing...
            </p>
        </div>

        <div id="module-viewport" class="max-w-7xl mx-auto opacity-100"></div>
    </main>

    <div id="profile-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] max-w-lg w-full p-8 shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">Profil Bisnes</h2>
                <button onclick="toggleProfileModal(false)" class="text-gray-400 hover:text-red-500 transition">
                    <i class="fas fa-times-circle text-2xl"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">Nama Syarikat</label>
                    <input type="text" id="edit-biz-name" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">No. SSM</label>
                        <input type="text" id="edit-biz-ssm" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">No. Telefon</label>
                        <input type="text" id="edit-biz-phone" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">Alamat Premis</label>
                    <textarea id="edit-biz-address" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none h-20"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">Nama Bank</label>
                        <input type="text" id="edit-biz-bank" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">No. Akaun</label>
                        <input type="text" id="edit-biz-acc" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none">
                    </div>
                </div>
            </div>

            <button onclick="updateBusinessProfile()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-[28px] font-black text-sm mt-8 shadow-xl shadow-blue-100 transition-all active:scale-95">
                SIMPAN PERUBAHAN
            </button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
